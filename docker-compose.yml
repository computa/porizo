version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: porizo-postgres
    environment:
      POSTGRES_DB: porizo
      POSTGRES_USER: porizo
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U porizo -d porizo"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: porizo-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,kms
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  localstack_data:
