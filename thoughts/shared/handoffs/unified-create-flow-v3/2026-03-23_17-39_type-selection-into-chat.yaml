decisions:
  - pre_session_shell: "Chat UI can be open before real V2 story session. preSessionPrompt is rendered from local state, NOT written to storyEngine.messages. Hard gate on storyId for active-session UI."
  - prompt_override: "Added initialPromptOverride param to StoryFlowCoordinator.startConversation() instead of abusing customSongRequest. Precedence: override > buildInitialPrompt() > empty."
  - song_options_card: "Generic-launch Song selection shows inline SongOptionsCard (Continue/Own Lyrics/Instrumental) before session starts. Preserves hasOwnLyrics/isInstrumental for no-type entry."
  - description_removal: "Intentional product change — SimpleCreateView description sheet removed. AI discovers story through conversation."

findings:
  - lyrics_controller_sync: "approveLyrics() and regenerateLyrics() are synchronous methods that launch internal Tasks. Must NOT be wrapped in Task { await }."
  - share_sheet_pattern: "Repo uses .sheet(item:) with payload structs, not boolean + separate state, to avoid stale-payload bugs."
  - resume_identity: "V2Session.storyId must match resumed track's storyId before restoring. Mismatched sessions discarded, synthetic resume message injected instead."
  - render_recovery_ownership: "recoverAfterForeground() belongs in RenderController, not the view. View decides when, controller decides how."

