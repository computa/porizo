# PHASE 2: VALIDATION (needs production data)
# ═══════════════════════════════════════════════════════════════════

phase2_validation:
  hypothesis: "Injecting retained detail inventory into the reasoning prompt reduces requiredMissing after first LLM pass, making repair fire less often."

  metrics_to_track:
    - name: "Detail inventory injection"
      log_pattern: "[V3] Detail inventory injected:"
      what_to_measure: "N total, M required per story session"
      healthy_signal: "M > 0 on all sessions with narrative"

    - name: "First-pass coverage"
      log_pattern: "[V3] Post-reasoning coverage:"
      what_to_measure: "X required missing after first LLM pass"
      healthy_signal: "X ≤ 2 for most stories (within REQUIRED_MISSING_TOLERANCE)"
      compare_to: "Pre-Phase-1 baseline (no inventory in prompt)"

    - name: "Repair frequency"
      log_pattern: "[V3 Engine] Detail coverage repair:"
      what_to_measure: "How often ensureCompletedStoryPackage appends missing sentences"
      healthy_signal: "Fires < 50% as often as before Phase 1"

    - name: "LLM rewrite frequency"
      log_pattern: "[V3] LLM narrative rewrite"
      what_to_measure: "How often the confirmation-path LLM rewrite fires"
      healthy_signal: "Fires rarely — most stories don't need it"

  how_to_validate:
    - step: "Deploy Phase 1 to staging/production"
    - step: "Run 10-20 real story sessions (mix of short and long stories)"
    - step: "Collect logs matching the patterns above"
    - step: "Compare requiredMissing counts: are they lower than before?"
    - step: "Check repair frequency: is it reduced?"

  decision_criteria:
    proceed_to_phase3: "requiredMissing decreases meaningfully AND repair fires less often"
    rethink: "requiredMissing unchanged — LLM ignoring the inventory constraint"
    abort: "Prompt bloat causes regression in narrative quality or compaction failures"

