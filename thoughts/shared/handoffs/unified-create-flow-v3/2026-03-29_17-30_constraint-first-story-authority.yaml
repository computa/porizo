decisions:
  - detail_ids_content_hash: "Use crypto.createHash('sha256') of category::normalizedText for stable IDs across re-extraction. Sequential d1/d2 IDs would shift across turns."
  - explicit_passing: "Pass retainedDetails explicitly via options, not hidden _eager_retained_details on state. Codex review: 'hidden cache that can drift.'"
  - initial_before_conversation: "Priority sort: initial-required → conversation-required → optional. Codex: 'original story is the backbone, latest turn doesn't win.'"
  - no_duplicate_ledger: "Don't add separate RETAINED DETAIL LEDGER to songwriter prompt. Upgrade existing judge block with IDs instead."
  - writer_stage_only: "Inject detail inventory into writer stage only, not selection/outline/editor. Editor gets it only if writer experiment shows benefit."
  - lazy_backfill_not_schema_bump: "Backfill IDs on existing details when ensureCompletedStoryPackage runs, don't force schema version bump for migration."
  - per_detail_truncation: "maxRetainedDetailChars: 120 prevents long sentences from bloating prompt. Count cap alone is insufficient."
  - gap_b_false_positive: "Codex claimed condensation loses details before extraction. Three specialist reviewers proved initial_prompt is stored raw on state. extractRetainedDetails always sees full original text."
  - safety_builder_aligned: "Both safety.js and builder.js use maxNarrativeLength: 4000. Codex's claim of 2000 safety limit was factually wrong."

findings:
  - circular_dep_was_p0: "validateSongContract permanently undefined due to CommonJS circular require timing. songwriter.js → ./v3 → ../songwriter. confirmStoryV3 had NO try/catch — crashes propagated as 500 errors. Fixed with lazy-require inside ensureCompletedStoryPackage."
  - repair_cycle_not_eliminated: "The constraint-first approach REDUCES dependence on repair, not eliminates it. Append repair + LLM rewrite remain as safety nets."
  - lexical_overlap_limitation: "significantWordOverlap is lexical only. Paraphrases can score 0. Documented with thresholds (0.3 judge, 0.4 prompt, 0.5 coverage). Future work: embedding-based matching."

