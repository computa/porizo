findings:
  - mic_crash_root_cause: "SpeechInputView declared @Environment(APIClientWrapper.self) but never used it. Any presentation path missing that wrapper crashed immediately. Fix: removed the dead dependency."
  - stt_env_fragility: "SwiftUI environment inheritance through nested fullScreenCover is unreliable. Explicit .environment(sttRouter) injection on the cover is defense-in-depth."
  - occasion_vs_genre: "Occasion and genre are NOT equivalent. Occasion shapes AI reasoning from turn 1 (structural). Genre only matters at track creation (cosmetic). Cannot treat them the same."
